# Enrichment layer of the shared `pulse` conda environment.
#
# This file does NOT stand alone: it adds, on top of pulse-data's base env, the
# extra libraries pulse-beacon needs — a JDK (which both builds the Java with
# Maven AND backs the in-process JPype bridge, so no JAVA_HOME juggling) and the
# JPype bridge itself.
#
# Usage (create the base from pulse-data first, then enrich the same `pulse` env):
#   conda env create -f ../../../pulse-data/py_environment.yml   # creates `pulse`
#   conda env update -f py_environment.yml                       # enriches `pulse`
#
# After this, one env runs the generators, builds the Java (`mvn`), and runs the
# cross-language bridge — see docs/cross-language-python-inprocess.md.

name: pulse
channels:
  - conda-forge
dependencies:
  - openjdk=17        # JVM: builds the Java (with Maven) and backs JPype at runtime
  - maven             # Java build tool
  - pytest            # runs the cross-language parity test (tests/test_historic_run_jpype.py)
  - pip
  - pip:
      - jpype1        # in-process bridge, Python-host direction (Python boots the JVM)
      - jep           # in-process bridge, Java-host direction (JVM boots CPython).
                      # Compiles native code at install: needs JAVA_HOME (set by the
                      # bundled openjdk) + a C compiler on PATH, and the shared
                      # libpython the conda Python ships.
